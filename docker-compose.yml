services:
  seediku:
    build: .
    image: seediku:local
    container_name: seediku
    restart: unless-stopped
    ports:
      - "8509:8509"
    environment:
      TZ: "Europe/Berlin"
      PORT: "8509"
      # ANPASSEN: Wenn Seediku hinter Reverse Proxy oder eigener Domain läuft.
      ISHIKU_APP_URL: "http://localhost:8509"
      ISHIKU_BASE_PATH: "/"
      ISHIKU_DATA_DIR: "/data"
      ISHIKU_LOG_LEVEL: "info"
      # ANPASSEN: Vor dem ersten Start durch ein langes zufälliges Setup-Secret ersetzen.
      # Dieses Secret wird nur zum Erstellen des ersten Adminaccounts benutzt.
      ISHIKU_SETUP_SECRET: "CHANGE-ME-seediku-first-run-setup-secret"
      # Fallback per Datei, falls gewünscht:
      # 1. secrets/setup_secret.txt anlegen.
      # 2. Die Volume-Zeile weiter unten einkommentieren.
      # 3. Diese Variable einkommentieren.
      # ISHIKU_SETUP_SECRET_FILE: "/run/secrets/ishiku_setup_secret"
      QBITTORRENT_URL: "http://qbittorrent:8185"
      # ANPASSEN: Wenn du qBittorrent-Zugangsdaten änderst.
      QBITTORRENT_USERNAME: "admin"
      QBITTORRENT_PASSWORD: "adminadmin"
      QBITTORRENT_WEBUI_URL: "http://localhost:8185"
    volumes:
      - ./data:/data
      - ./config:/config
      # Fallback per Datei, falls ISHIKU_SETUP_SECRET_FILE oben genutzt wird:
      # - ./secrets/setup_secret.txt:/run/secrets/ishiku_setup_secret:ro
    depends_on:
      qbittorrent:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8509/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: seediku-qbittorrent
    restart: unless-stopped
    environment:
      # ANPASSEN: Falls Docker auf deinem Host andere User-/Gruppen-IDs braucht.
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Berlin"
      WEBUI_PORT: "8185"
      TORRENTING_PORT: "6881"
    volumes:
      - ./config/qbittorrent:/config
      - ./downloads/incomplete:/downloads/incomplete
      - ./downloads/complete:/downloads/complete
      - ./downloads/watch:/downloads/watch
    ports:
      - "8185:8185"
      - "6881:6881/tcp"
      - "6881:6881/udp"
