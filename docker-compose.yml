name: seediku

services:
  seediku:
    # Image: https://github.com/MaroIshiku/seediku/pkgs/container/seediku
    image: ghcr.io/maroishiku/seediku:latest
    # Für lokale Entwicklung statt GHCR:
    # build: .
    container_name: seediku
    restart: unless-stopped
    ports:
      - target: 8509
        published: "8509"
        protocol: tcp
    environment:
      TZ: "Europe/Berlin"
      PORT: "8509"
      # ANPASSEN: Wenn Seediku hinter Reverse Proxy oder eigener Domain läuft.
      ISHIKU_APP_URL: "http://localhost:8509"
      ISHIKU_BASE_PATH: "/"
      ISHIKU_DATA_DIR: "/data"
      ISHIKU_LOG_LEVEL: "info"
      # ANPASSEN: Vor dem ersten Start durch ein langes zufälliges Setup-Secret ersetzen.
      # Dieses Secret wird nur zum Erstellen des ersten Adminaccounts benutzt.
      ISHIKU_SETUP_SECRET: "CHANGE-ME-seediku-first-run-setup-secret"
      # Fallback per Datei, falls gewünscht:
      # 1. secrets/setup_secret.txt anlegen.
      # 2. Die Volume-Zeile weiter unten einkommentieren.
      # 3. Diese Variable einkommentieren.
      # ISHIKU_SETUP_SECRET_FILE: "/run/secrets/ishiku_setup_secret"
      QBITTORRENT_URLS: "http://seediku-qbittorrent:8185,http://qbittorrent:8185,http://host.docker.internal:8185"
      # ANPASSEN: Wenn du qBittorrent-Zugangsdaten änderst.
      QBITTORRENT_USERNAME: "admin"
      QBITTORRENT_PASSWORD: "adminadmin"
      QBITTORRENT_WEBUI_URL: "http://192.168.1.110:8185"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: /DATA/AppData/seediku/data
        target: /data
      - type: bind
        source: /DATA/AppData/seediku/config
        target: /config
      # Fallback per Datei, falls ISHIKU_SETUP_SECRET_FILE oben genutzt wird:
      # - type: bind
      #   source: /DATA/AppData/seediku/secrets/setup_secret.txt
      #   target: /run/secrets/ishiku_setup_secret
      #   read_only: true
    depends_on:
      - qbittorrent
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8509/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      icon: https://raw.githubusercontent.com/MaroIshiku/seediku/main/public/assets/logos/seediku.png
    networks:
      - seediku-net

  qbittorrent:
    # Image: https://github.com/linuxserver/docker-qbittorrent/pkgs/container/qbittorrent
    image: ghcr.io/linuxserver/qbittorrent:4.6.7
    container_name: seediku-qbittorrent
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /config/qBittorrent
        if [ ! -f /config/.seediku_qbittorrent_initialized ]; then
          if [ -f /config/qBittorrent/qBittorrent.conf ]; then
            awk '!/^(Accepted|WebUI\\(CSRFProtection|HostHeaderValidation|Password_PBKDF2|Port|Username))=/' /config/qBittorrent/qBittorrent.conf > /config/qBittorrent/qBittorrent.conf.tmp
            mv /config/qBittorrent/qBittorrent.conf.tmp /config/qBittorrent/qBittorrent.conf
          else
            : > /config/qBittorrent/qBittorrent.conf
          fi
          cat >> /config/qBittorrent/qBittorrent.conf <<'EOF'

        [LegalNotice]
        Accepted=true

        [Preferences]
        WebUI\CSRFProtection=false
        WebUI\HostHeaderValidation=false
        WebUI\Password_PBKDF2="@ByteArray(ARQ77eY1NUZaQsuDHbIMCA==:0WMRkYTUWVT9wVvdDtHAjU9b3b7uB8NR1Gur2hmQCvCDpm39Q+PsJRJPaCU51dEiz+dTzh8qbPsL8WkFljQYFQ==)"
        WebUI\Port=8185
        WebUI\Username=admin
        EOF
          touch /config/.seediku_qbittorrent_initialized
        fi
        exec /init
    environment:
      # ANPASSEN: Falls Docker auf deinem Host andere User-/Gruppen-IDs braucht.
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Berlin"
      WEBUI_PORT: "8185"
      TORRENTING_PORT: "6881"
    volumes:
      - type: bind
        source: /DATA/AppData/seediku/config/qbittorrent
        target: /config
      - type: bind
        source: /DATA/AppData/seediku/downloads/incomplete
        target: /downloads/incomplete
      - type: bind
        source: /DATA/AppData/seediku/downloads/complete
        target: /downloads/complete
      - type: bind
        source: /DATA/AppData/seediku/downloads/watch
        target: /downloads/watch
    ports:
      - target: 8185
        published: "8185"
        protocol: tcp
      - target: 6881
        published: "6881"
        protocol: tcp
      - target: 6881
        published: "6881"
        protocol: udp
    networks:
      seediku-net:
        aliases:
          - qbittorrent
          - seediku-qbittorrent

networks:
  seediku-net:
    name: seediku-net

x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://raw.githubusercontent.com/MaroIshiku/seediku/main/public/assets/logos/seediku.png
  index: /
  is_uncontrolled: false
  port_map: "8509"
  scheme: http
  store_app_id: seediku
  title:
    custom: Seediku
    en_us: Seediku
