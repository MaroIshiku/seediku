services:
  seediku:
    environment:
      QBITTORRENT_URL: "http://gluetun:8185"
      QBITTORRENT_WEBUI_URL: "http://localhost:8185"
    depends_on:
      gluetun:
        condition: service_healthy
      qbittorrent:
        condition: service_started

  gluetun:
    # Image: https://github.com/qdm12/gluetun/pkgs/container/gluetun
    image: ghcr.io/qdm12/gluetun:latest
    container_name: seediku-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8185:8185"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    environment:
      TZ: "Europe/Berlin"
      # ANPASSEN: Provider, VPN-Typ und Zugangsdaten gemäß Gluetun-Doku setzen.
      VPN_SERVICE_PROVIDER: "custom"
      VPN_TYPE: "wireguard"
      # ANPASSEN: Provider-spezifische Werte bewusst nicht vorausgefüllt.
      # Offizielle Anleitung: https://github.com/qdm12/gluetun/wiki
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5

  qbittorrent:
    network_mode: "service:gluetun"
    ports: !reset []
